# This configuration will be used by a manual AppVeyor build used:
# Build the tools
# Deploy to GitHub releases
# Deploy to NuGet

image: Visual Studio 2022

pull_requests:
  do_not_increment_build_number: true

branches:
  only:
    - master

platform: Any CPU
configuration: Release

shallow_clone: true
skip_tags: true

environment:
  GITHUB_AUTH_TOKEN:
    secure: a+daW6wCxNjiC19/k6jLSgweptfO1hx8779M6wDFPaEA/Hg14D6jVqMBw/mO27Sq

assembly_info:
  patch: true
  file: AssemblyInfo.*
  assembly_version: "{version}"
  assembly_file_version: "{version}"
  assembly_informational_version: "{version}"

init:
  - ps: |
      If (-Not $env:APPVEYOR_PULL_REQUEST_NUMBER) {
        $env:IS_NOT_PR = "true"
      }

before_build:
  - ps: |
      (Get-Content src\Aquarius.FieldDataFramework.nuspec).
        Replace('0.0.0', $env:APPVEYOR_BUILD_VERSION) | Set-Content src\Aquarius.FieldDataFramework.nuspec
  - dotnet restore src\FieldDataFramework.sln

build_script:
  - dotnet build src\FieldDataFramework.sln -c Release --no-restore

after_build:
  - nuget pack src\Aquarius.FieldDataFramework.nuspec

artifacts:
  # Existing artifacts - unchanged for backward compatibility (net472)
  - path: src\Library
    name: FieldDataPluginFramework
    type: zip

  - path: src\PluginPackager\bin\Release\PluginPackager.exe
    name: PluginPackager
    type: file

  - path: src\PluginTester\bin\Release\PluginTester.exe
    name: PluginTester
    type: file

  - path: src\JsonFieldData\deploy\Release\JsonFieldData.plugin
    name: JsonPlugin
    type: file

  - path: src\MultiFile\deploy\Release\MultiFile.plugin
    name: MultiFilePlugin
    type: file

  - path: src\MultiFile.Configurator\bin\Release\MultiFile.Configurator.exe
    name: MultiFile.Configurator
    type: file

  - path: src\FieldVisitHotFolderService\bin\Release
    name: FieldVisitHotFolderService
    type: zip

  - path: 'Aquarius.FieldDataFramework.*.nupkg'
    name: AllPackages
    type: NuGetPackage

  # NEW: .NET 10 artifacts with -net10 suffix for future automation
  - path: src\PluginPackager\bin\Release\net10.0
    name: PluginPackager-net10
    type: zip

  - path: src\PluginTester\bin\Release\net10.0
    name: PluginTester-net10
    type: zip

  - path: src\JsonFieldData\deploy\Release\net10.0\JsonFieldData.plugin
    name: JsonPlugin-net10
    type: file

  - path: src\MultiFile\deploy\Release\net10.0\MultiFile.plugin
    name: MultiFilePlugin-net10
    type: file

  - path: src\MultiFile.Configurator\bin\Release\net10.0
    name: MultiFile.Configurator-net10
    type: zip

  - path: src\FieldVisitHotFolderService\bin\Release\net10.0
    name: FieldVisitHotFolderService-net10
    type: zip

deploy:
  - provider: GitHub
    tag: v$(APPVEYOR_BUILD_VERSION)
    release: AQUARIUS Field Data Framework $(APPVEYOR_BUILD_VERSION)
    description: ''
    artifact: FieldDataPluginFramework,PluginPackager,PluginTester,JsonPlugin,FieldVisitHotFolderService,MultiFilePlugin,MultiFile.Configurator
    auth_token: $(GITHUB_AUTH_TOKEN)
    on:
      is_not_pr: true

  - provider: NuGet
    api_key:
      secure: vAD34IxSthEP1RXr3dpfTr2TM9jMRQnsuusgdS4ETrYtswt9WWAG2fKCEYAVVpVv
    skip_symbols: false
    artifact: AllPackages
